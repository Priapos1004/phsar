[pytest]
asyncio_mode = auto
log_cli = true
log_cli_level = DEBUG
filterwarnings =
    ignore:'crypt' is deprecated:DeprecationWarning:passlib
    ignore:Accessing argon2.__version__ is deprecated:DeprecationWarning:passlib
    ignore:Support for class-based `config` is deprecated:pydantic.PydanticDeprecatedSince20:passlib