[pytest]
asyncio_mode = auto
log_cli = true
log_cli_level = DEBUG
filterwarnings =
    ignore:'crypt' is deprecated and slated for removal:DeprecationWarning
    ignore:Accessing argon2.__version__ is deprecated:DeprecationWarning
    ignore:Support for class-based `config` is deprecated:pydantic.PydanticDeprecatedSince20