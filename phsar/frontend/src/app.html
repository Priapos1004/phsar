<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="robots" content="noindex, nofollow" />
		<link rel="icon" type="image/png" sizes="32x32" href="%sveltekit.assets%/favicon-32x32.png" />
		<link rel="icon" type="image/png" sizes="192x192" href="%sveltekit.assets%/favicon-192x192.png" />
		<link rel="apple-touch-icon" sizes="180x180" href="%sveltekit.assets%/apple-touch-icon.png" />
		<link rel="shortcut icon" href="%sveltekit.assets%/favicon.ico" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>PHSAR</title>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<!-- Theme allowlist must stay in sync with THEMES in lib/themes.ts -->
		<script>try{var t=localStorage.getItem('phsar-theme');if(t&&['red','blue','green'].includes(t))document.documentElement.classList.add('theme-'+t)}catch(e){}</script>
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
