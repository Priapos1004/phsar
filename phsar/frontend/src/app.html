<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<link rel="icon" href="%sveltekit.assets%/phsar_logo_inverted.png" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>PHSAR</title>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<!-- Theme allowlist must stay in sync with THEMES in lib/themes.ts -->
		<script>try{var t=localStorage.getItem('phsar-theme');if(t&&['red','blue','green'].includes(t))document.documentElement.classList.add('theme-'+t)}catch(e){}</script>
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
