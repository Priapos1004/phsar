name: Frontend

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  check-test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: phsar/frontend

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up bun
      uses: oven-sh/setup-bun@v2
      with:
        bun-version-file: phsar/frontend/package.json

    - name: Install dependencies
      run: bun install --frozen-lockfile

    - name: Type check
      run: bun run check

    - name: Run tests
      run: bun run test
