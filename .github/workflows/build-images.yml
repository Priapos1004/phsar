name: Build & Push Images

# Builds backend + frontend images on any tag matching v* (including previews
# like v0.13.0-rc1) and pushes them to ghcr.io. Coolify pulls the tagged image
# instead of building on the VM — the 2 vCPU / 4 GB VM can't survive a bun
# SvelteKit build (OOM kill at exit code 137 after ~40 min of swap thrash).
#
# To cut a preview from any feature branch:
#   git tag v0.13.0-rc1 && git push origin v0.13.0-rc1
#
# To retry a broken build without re-tagging, use the "Run workflow" button
# and pass the existing tag name.

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing git tag to (re)build (e.g. v0.13.0 or v0.13.0-rc1)'
        required: true

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: backend
            context: ./phsar
            dockerfile: ./phsar/Dockerfile
            image: phsar-backend
          - name: frontend
            context: ./phsar/frontend
            dockerfile: ./phsar/frontend/Dockerfile
            image: phsar-frontend
    steps:
      - name: Resolve version
        id: ver
        run: echo "value=${{ inputs.tag || github.ref_name }}" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build args not declared in a given Dockerfile produce a harmless
      # BuildKit warning — passing all three here keeps the matrix symmetric.
      - uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          platforms: linux/amd64
          tags: ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}:${{ steps.ver.outputs.value }}
          build-args: |
            APP_VERSION=${{ steps.ver.outputs.value }}
            PUBLIC_API_BASE_URL=${{ vars.PUBLIC_API_BASE_URL }}
            PUBLIC_APP_VERSION=${{ steps.ver.outputs.value }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}
